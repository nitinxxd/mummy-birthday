<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Birthday Gift</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500;600&family=Playfair+Display+SC:wght@400&family=Reenie+Beanie&display=swap"
        rel="stylesheet">

    <style>
        /* Modern Premium Reset */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* FIX: Prevents global viewport bouncing or browser navigation hiding buttons */
        html,
        body {
            height: 100%;
            height: -webkit-fill-available;
            overflow: hidden;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at 20% 20%, #faf8f5 0%, #f3ede6 50%, #e6ded4 100%);
            color: #332c29;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            /* Securely distributes cards at top and buttons at bottom */
            align-items: center;
            height: 100vh;
            height: 100dvh;
            /* Accounts dynamically for mobile URL address and navbar shifts */
            padding: 20px 24px 30px 24px;
            /* Generous bottom padding to clear mobile gesture home bars */
            position: relative;
            -webkit-font-smoothing: antialiased;
            transition: background 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Unique vibrant state backgrounds for layout traversal */
        body.bg-page2 {
            background: linear-gradient(135deg, #fff3f3 0%, #fff0e6 50%, #fed7aa 100%);
        }

        body.bg-page3 {
            background: linear-gradient(135deg, #111827 0%, #881337 50%, #f59e0b 100%);
        }

        /* Ambient shifting watercolor depth */
        body::before {
            content: "";
            position: absolute;
            top: -50%;
            left: -50%;
            right: -50%;
            bottom: -50%;
            background: radial-gradient(circle at 80% 80%, rgba(255, 255, 255, 0.15) 0%, transparent 60%);
            animation: watercolorShift 14s infinite alternate ease-in-out;
            z-index: 1;
            pointer-events: none;
        }

        @keyframes watercolorShift {
            0% {
                transform: translate(0, 0) scale(1);
            }

            100% {
                transform: translate(3%, 2%) scale(1.05);
            }
        }

        /* FIX: Prevents container boxes from spilling lower than the bottom navigation boundaries */
        .card-page {
            display: none;
            width: 100%;
            max-width: 360px;
            flex: 1;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            z-index: 2;
            min-height: 0;
        }

        .card-page.active {
            display: flex;
        }

        /* --- PAGE 1: VELVET SAGE RIBBON & DELUGE POPPER --- */
        .ribbon-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            transition: all 0.9s cubic-bezier(0.25, 1, 0.5, 1);
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
        }

        .curved-ribbon-svg {
            position: absolute;
            top: -10vh;
            height: 120vh;
            width: 160px;
            filter: drop-shadow(6px 14px 16px rgba(18, 38, 25, 0.25));
            transition: all 0.8s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .knot-interactive-assembly {
            position: absolute;
            top: 42%;
            width: 180px;
            height: 140px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 3;
            transition: all 0.8s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .tag-rectangular-box {
            background: rgba(255, 255, 255, 0.94);
            padding: 12px 24px;
            border-radius: 8px;
            box-shadow: 0 12px 35px rgba(44, 38, 35, 0.08);
            border: 1px solid #d4af37;
            outline: 3px solid rgba(212, 175, 55, 0.15);
            outline-offset: -6px;
            margin-top: -10px;
            position: relative;
            z-index: 5;
            transform: rotate(-1deg);
        }

        .ribbon-instructions {
            font-family: 'Playfair Display SC', serif;
            font-size: 0.68rem;
            letter-spacing: 2.5px;
            color: #2d4a36;
            font-weight: 600;
            text-transform: uppercase;
            text-align: center;
            white-space: nowrap;
            line-height: 1.3;
            pointer-events: none;
        }

        .ribbon-wrapper.untied {
            opacity: 0;
            pointer-events: none;
            transform: scale(1.06);
        }

        .ribbon-wrapper.untied .curved-ribbon-svg,
        .ribbon-wrapper.untied .knot-interactive-assembly {
            transform: scale(0.2);
            filter: blur(8px);
        }

        /* --- PAGE 1 POPPER CELEBRATION --- */
        .popper-overlay {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .popper-canister {
            position: absolute;
            bottom: -20px;
            left: -20px;
            width: 90px;
            height: 90px;
            transform: rotate(45deg);
            opacity: 0;
        }

        .popper-confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            opacity: 0;
            bottom: 40px;
            left: 40px;
        }

        .burst-active .popper-overlay {
            display: block;
        }

        .burst-active .popper-canister {
            animation: popperPop 0.6s cubic-bezier(0.18, 0.89, 0.32, 1.28) forwards;
        }

        .burst-active .pc-1 {
            background: #ef4444;
            width: 12px;
            height: 12px;
            animation: blastDiag1 3s infinite cubic-bezier(0.1, 0.8, 0.2, 1);
        }

        .burst-active .pc-2 {
            background: #3b82f6;
            border-radius: 2px;
            width: 8px;
            height: 18px;
            animation: blastDiag2 3.2s infinite cubic-bezier(0.1, 0.8, 0.2, 1) 0.1s;
        }

        .burst-active .pc-3 {
            background: #dfba6b;
            animation: blastDiag3 2.8s infinite cubic-bezier(0.1, 0.8, 0.2, 1) 0.2s;
        }

        .burst-active .pc-4 {
            background: #10b981;
            width: 16px;
            height: 6px;
            animation: blastDiag4 3.1s infinite cubic-bezier(0.1, 0.8, 0.2, 1);
        }

        .burst-active .pc-5 {
            background: #ec4899;
            border-radius: 3px;
            width: 10px;
            height: 10px;
            animation: blastDiag5 2.9s infinite cubic-bezier(0.1, 0.8, 0.2, 1) 0.3s;
        }

        .burst-active .pc-6 {
            background: #f59e0b;
            width: 14px;
            height: 14px;
            animation: blastDiag1 3.3s infinite cubic-bezier(0.1, 0.8, 0.2, 1) 0.4s;
        }

        .burst-active .pc-7 {
            background: #8b5cf6;
            border-radius: 50%;
            width: 9px;
            height: 9px;
            animation: blastDiag3 2.7s infinite cubic-bezier(0.1, 0.8, 0.2, 1) 0.15s;
        }

        h1.cover-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 3.2rem;
            font-weight: 400;
            line-height: 1.1;
            color: #2d4a36;
            margin-bottom: 12px;
            text-align: center;
            opacity: 0;
            transform: translateY(15px);
            transition: all 1.2s ease-out 0.4s;
            z-index: 2;
        }

        .serif {
            font-size: 1.6rem;
            text-align: center;
            opacity: 0;
            transform: translateY(15px);
            transition: all 1.2s ease-out 0.7s;
            z-index: 2;
        }

        .revealed h1.cover-title,
        .revealed .serif {
            opacity: 1;
            transform: translateY(0);
        }

        /* --- PAGE 2: PUNCHY BIRTHDAY CAKE AREA --- */
        .interactive-area {
            background: #ffffff;
            width: 100%;
            padding: 45px 24px;
            border-radius: 16px;
            box-shadow: 0 25px 50px rgba(244, 63, 94, 0.15);
            border: 2px solid #f43f5e;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .cake-wrapper {
            height: 120px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            margin-bottom: 20px;
            position: relative;
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .cake-candle {
            width: 8px;
            height: 35px;
            background: linear-gradient(to right, #f43f5e, #ffffff, #f43f5e);
            position: relative;
            z-index: 3;
            transition: opacity 0.3s ease;
        }

        .cake-candle::before {
            content: "";
            position: absolute;
            top: -4px;
            left: 3px;
            width: 2px;
            height: 5px;
            background: #332c29;
        }

        .cake-flame {
            width: 12px;
            height: 20px;
            background: linear-gradient(to bottom, #ffffff, #facc15, #f97316);
            border-radius: 50% 50% 35% 35%;
            position: absolute;
            top: -22px;
            left: -2px;
            box-shadow: 0 0 15px #facc15, 0 0 30px #f97316;
            animation: elegantFlicker 0.6s infinite alternate ease-in-out;
        }

        .cake-body-container {
            display: flex;
            justify-content: center;
            width: 160px;
            height: 65px;
            position: relative;
            transition: gap 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            gap: 0px;
            filter: drop-shadow(0 8px 16px rgba(244, 63, 94, 0.2));
        }

        .cake-half {
            width: 80px;
            height: 65px;
            background: #fbcfe8;
            position: relative;
            border-bottom: 5px solid #f43f5e;
            box-shadow: inset 0 6px 0 rgba(255, 255, 255, 0.5);
        }

        .cake-half.left-slice {
            border-radius: 12px 0 0 4px;
        }

        .cake-half.right-slice {
            border-radius: 0 12px 4px 0;
        }

        .cake-half::after {
            content: "";
            position: absolute;
            top: 24px;
            left: 0;
            width: 100%;
            height: 14px;
            background: #fffbeb;
            border-top: 2.5px solid #fb7185;
            border-bottom: 2.5px solid #fb7185;
        }

        .slider-container {
            width: 100%;
            height: 46px;
            background: #fff5f5;
            border-radius: 23px;
            border: 2px solid #f43f5e;
            position: relative;
            display: flex;
            align-items: center;
            padding: 0 4px;
            margin-top: 20px;
            box-shadow: inset 0 2px 6px rgba(244, 63, 94, 0.08);
        }

        .slider-text {
            position: absolute;
            width: 100%;
            text-align: center;
            font-size: 0.75rem;
            font-family: 'Playfair Display SC', serif;
            letter-spacing: 1.5px;
            color: #f43f5e;
            pointer-events: none;
            text-transform: uppercase;
            font-weight: 600;
        }

        .slider-knife-btn {
            width: 36px;
            height: 36px;
            background: #ffffff;
            border: 2px solid #f43f5e;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: grab;
            position: absolute;
            left: 4px;
            z-index: 5;
            box-shadow: 0 4px 12px rgba(244, 63, 94, 0.2);
            touch-action: none;
            font-size: 1.1rem;
        }

        .page2-popper-overlay {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 99;
        }

        .wish-emoji {
            position: absolute;
            font-size: 3.5rem;
            opacity: 0;
            bottom: 20%;
        }

        .cut-complete .page2-popper-overlay {
            display: block;
        }

        .cut-complete .we-1 {
            animation: verticalPopper 1.8s infinite cubic-bezier(0.1, 0.8, 0.2, 1);
            left: 8%;
        }

        .cut-complete .we-2 {
            animation: verticalPopper 1.5s infinite cubic-bezier(0.1, 0.8, 0.2, 1) 0.2s;
            left: 28%;
        }

        .cut-complete .we-3 {
            animation: verticalPopper 1.9s infinite cubic-bezier(0.1, 0.8, 0.2, 1) 0.4s;
            left: 48%;
        }

        .cut-complete .we-4 {
            animation: verticalPopper 1.6s infinite cubic-bezier(0.1, 0.8, 0.2, 1) 0.1s;
            right: 28%;
        }

        .cut-complete .we-5 {
            animation: verticalPopper 1.4s infinite cubic-bezier(0.1, 0.8, 0.2, 1) 0.3s;
            right: 8%;
        }

        .cut-complete .cake-body-container {
            gap: 40px;
        }

        .cut-complete .cake-flame {
            display: none;
        }

        .cut-complete .cake-candle {
            opacity: 0.2;
        }

        .cut-complete .slider-container {
            opacity: 0.1;
            pointer-events: none;
        }

        /* --- PAGE 3: ELECTRIC POLAROID MOSAIC CANVAS --- */
        .film-gallery-title {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 700;
            font-size: 2.3rem;
            margin-bottom: 2px;
            color: #ffffff;
            text-align: center;
            text-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
        }

        .film-gallery-subtitle {
            font-size: 0.8rem;
            color: #fef08a;
            font-weight: 500;
            margin-bottom: 20px;
            text-align: center;
            letter-spacing: 1px;
            text-transform: uppercase;
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
        }

        /* FIXED: Compressed bounding height to ensure frames wrap comfortably on small viewports */
        .mosaic-grid-box {
            width: 100%;
            height: 310px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .polaroid-card {
            position: absolute;
            background: #ffffff;
            padding: 8px 8px 18px 8px;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.35), 0 3px 8px rgba(0, 0, 0, 0.18);
            border-radius: 2px;
            transition: transform 0.4s ease, z-index 0.1s;
        }

        .polaroid-card img {
            width: 125px;
            height: 125px;
            object-fit: cover;
            display: block;
            border: 1px solid #f3f4f6;
        }

        .polaroid-caption {
            font-family: 'Reenie Beanie', cursive;
            font-size: 1.5rem;
            color: #1f2937;
            text-align: center;
            margin-top: 8px;
            line-height: 1;
        }

        /* Pack coordinates tightly inside safe boundaries */
        .p-card-1 {
            top: 0px;
            left: 20px;
            transform: rotate(-6deg);
            z-index: 3;
        }

        .p-card-2 {
            top: -15px;
            right: 20px;
            transform: rotate(5deg);
            z-index: 2;
        }

        .p-card-3 {
            bottom: 10px;
            left: 35px;
            transform: rotate(4deg);
            z-index: 4;
        }

        .p-card-4 {
            bottom: -10px;
            right: 25px;
            transform: rotate(-4deg);
            z-index: 1;
        }

        .polaroid-card:active {
            z-index: 50 !important;
            transform: scale(1.08) rotate(0deg) !important;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        }

        /* Core Animations */
        @keyframes elegantFlicker {
            0% {
                transform: scale(1) rotate(-1deg);
            }

            100% {
                transform: scale(1.05) rotate(1.2deg);
            }
        }

        @keyframes verticalPopper {
            0% {
                transform: translateY(0) scale(0.3) rotate(0deg);
                opacity: 0;
            }

            15% {
                opacity: 1;
            }

            85% {
                opacity: 1;
            }

            100% {
                transform: translateY(-460px) scale(1.3) rotate(35deg);
                opacity: 0;
                filter: blur(1px);
            }
        }

        @keyframes popperPop {
            0% {
                transform: translate(-30px, 30px) rotate(45deg);
                opacity: 0;
            }

            100% {
                transform: translate(0, 0) rotate(45deg);
                opacity: 1;
            }
        }

        @keyframes blastDiag1 {
            0% {
                transform: translate(0, 0) rotate(0deg);
                opacity: 0;
            }

            5% {
                opacity: 1;
            }

            35% {
                transform: translate(160px, -290px) rotate(280deg);
                opacity: 1;
            }

            100% {
                transform: translate(200px, -40px) rotate(600deg);
                opacity: 0;
            }
        }

        @keyframes blastDiag2 {
            0% {
                transform: translate(0, 0) rotate(0deg);
                opacity: 0;
            }

            5% {
                opacity: 1;
            }

            35% {
                transform: translate(290px, -180px) rotate(-190deg);
                opacity: 1;
            }

            100% {
                transform: translate(335px, 60px) rotate(-400deg);
                opacity: 0;
            }
        }

        @keyframes blastDiag3 {
            0% {
                transform: translate(0, 0) rotate(0deg);
                opacity: 0;
            }

            5% {
                opacity: 1;
            }

            35% {
                transform: translate(210px, -410px) rotate(390deg);
                opacity: 1;
            }

            100% {
                transform: translate(240px, -140px) rotate(700deg);
                opacity: 0;
            }
        }

        @keyframes blastDiag4 {
            0% {
                transform: translate(0, 0) rotate(0deg);
                opacity: 0;
            }

            5% {
                opacity: 1;
            }

            35% {
                transform: translate(90px, -430px) rotate(-140deg);
                opacity: 1;
            }

            100% {
                transform: translate(115px, -160px) rotate(-340deg);
                opacity: 0;
            }
        }

        @keyframes blastDiag5 {
            0% {
                transform: translate(0, 0) rotate(0deg);
                opacity: 0;
            }

            5% {
                opacity: 1;
            }

            35% {
                transform: translate(340px, -320px) rotate(310deg);
                opacity: 1;
            }

            100% {
                transform: translate(370px, -60px) rotate(600deg);
                opacity: 0;
            }
        }

        /* FIXED: Pinned navigation layout framework isolated completely at base viewport window */
        .nav-container {
            width: 100%;
            max-width: 360px;
            display: flex;
            justify-content: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
            margin-top: auto;
            /* Drives structural balance cleanly downward */
            padding-top: 15px;
        }

        .nav-container.show {
            opacity: 1;
            pointer-events: auto;
        }

        .bg-page3 .nav-btn {
            background: #ffffff;
            color: #881337;
            font-weight: 700;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.4);
        }

        .nav-btn {
            background: #2d4a36;
            color: #ffffff;
            border: none;
            padding: 14px 44px;
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            border-radius: 6px;
            box-shadow: 0 10px 25px rgba(45, 74, 54, 0.15);
            -webkit-tap-highlight-color: transparent;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            width: 100%;
            text-align: center;
        }
    </style>
</head>

<body>

    <div id="page1" class="card-page active">

        <div class="ribbon-wrapper" id="ribbonSystem" onmousedown="startUntie()" ontouchstart="startUntie()"
            onmouseup="cancelUntie()" ontouchend="cancelUntie()">

            <svg class="curved-ribbon-svg" viewBox="0 0 100 800" preserveAspectRatio="none">
                <path d="M50,-20 C10,130 90,230 50,380 C10,530 90,670 50,820" fill="none" stroke="url(#velvetSage)"
                    stroke-width="36" stroke-linecap="round" />
                <defs>
                    <linearGradient id="velvetSage" x1="0%" y1="0%" x2="100%" y2="0%">
                        <stop offset="0%" stop-color="#14261a" />
                        <stop offset="25%" stop-color="#223f2b" />
                        <stop offset="50%" stop-color="#345e43" />
                        <stop offset="75%" stop-color="#223f2b" />
                        <stop offset="100%" stop-color="#14261a" />
                    </linearGradient>
                </defs>
            </svg>

            <div class="knot-interactive-assembly">
                <svg width="100%" height="80px" viewBox="0 0 180 100" preserveAspectRatio="xMidYMid meet">
                    <defs>
                        <linearGradient id="knotGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#345e43" />
                            <stop offset="50%" stop-color="#223f2b" />
                            <stop offset="100%" stop-color="#14261a" />
                        </linearGradient>
                        <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
                            <feDropShadow dx="2" dy="5" stdDeviation="4" flood-opacity="0.3" />
                        </filter>
                    </defs>
                    <path d="M90,50 C40,20 10,25 20,50 C30,75 70,65 90,50" fill="url(#knotGrad)"
                        filter="url(#shadow)" />
                    <path d="M90,50 C140,20 170,25 160,50 C150,75 110,65 90,50" fill="url(#knotGrad)"
                        filter="url(#shadow)" />
                    <path d="M76,38 C80,36 100,36 104,38 C108,45 106,55 104,62 C100,64 80,64 76,62 C72,55 72,45 76,38 Z"
                        fill="url(#knotGrad)" stroke="#14261a" stroke-width="1" filter="url(#shadow)" />
                </svg>

                <div class="tag-rectangular-box">
                    <div class="ribbon-instructions" id="tagText">Hold this to open</div>
                </div>
            </div>

        </div>

        <div class="popper-overlay">
            <svg class="popper-canister" viewBox="0 0 100 100">
                <path d="M20,80 L80,80 L50,20 Z" fill="#ef4444" stroke="#d4af37" stroke-width="2" />
                <path d="M35,50 Q50,60 65,50" fill="none" stroke="#fff" stroke-width="3" />
                <circle cx="50" cy="80" r="6" fill="#3b82f6" />
            </svg>
            <div class="popper-confetti pc-1"></div>
            <div class="popper-confetti pc-2"></div>
            <div class="popper-confetti pc-3"></div>
            <div class="popper-confetti pc-4"></div>
            <div class="popper-confetti pc-5"></div>
            <div class="popper-confetti pc-6"></div>
            <div class="popper-confetti pc-7"></div>
        </div>

        <h1 class="cover-title">Happy Birthday,<br>Mummy.</h1>
        <div class="serif" style="margin-top: 20px;">🎂🎉</div>
    </div>


    <div id="page2" class="card-page">
        <div class="interactive-area" id="wishCard">

            <div class="page2-popper-overlay">
                <div class="wish-emoji we-1">🎉</div>
                <div class="wish-emoji we-2">🥳</div>
                <div class="wish-emoji we-3">🎂</div>
                <div class="wish-emoji we-4">🧨</div>
                <div class="wish-emoji we-5">✨</div>
            </div>

            <div class="cake-wrapper" id="cakeContainer">
                <div class="cake-candle">
                    <div class="cake-flame"></div>
                </div>
                <div class="cake-body-container">
                    <div class="cake-half left-slice"></div>
                    <div class="cake-half right-slice"></div>
                </div>
            </div>

            <div id="prompt-text">
                <h2
                    style="font-family: 'Cormorant Garamond', serif; font-weight: 600; font-size: 1.8rem; margin-bottom: 6px; color: #f43f5e;">
                    Make a Wish</h2>
                <div class="slider-container">
                    <div class="slider-text">Slide knife to cut cake</div>
                    <div class="slider-knife-btn" id="knifeBtn">🔪</div>
                </div>
            </div>

        </div>
    </div>


    <div id="page3" class="card-page">
        <h2 class="film-gallery-title">Moments</h2>
        <div class="film-gallery-subtitle">Tap cards to bring forward ❤️</div>

        <div class="mosaic-grid-box">

            <div class="polaroid-card p-card-1">
                <img src="images/ph1.jpg" alt="Memory 1">
                <div class="polaroid-caption">Best Mom ever</div>
            </div>

            <div class="polaroid-card p-card-2">
                <img src="images/ph2.jpg" alt="Memory 2">
                <div class="polaroid-caption">A beautiful smile</div>
            </div>

            <div class="polaroid-card p-card-3">
                <img src="images/ph3.jpg" alt="Memory 3">
                <div class="polaroid-caption">Unforgettable day</div>
            </div>

            <div class="polaroid-card p-card-4">
                <img src="images/ph4.jpg" alt="Memory 4">
                <div class="polaroid-caption">Always laughing</div>
            </div>

        </div>
    </div>


    <div class="nav-container" id="globalNav">
        <button id="nextBtn" class="nav-btn" onclick="nextPage()">Open Card</button>
    </div>


    <script>
        let holdTimer;
        let currentPage = 1;
        const totalPages = 3;

        // Force-disables dynamic multi-tap safari webview zoom loops
        document.addEventListener('gesturestart', function (e) {
            e.preventDefault();
        });

        // --- Page 1 Ribbon Script Router ---
        function startUntie() {
            document.getElementById('tagText').innerHTML = "Opening...";
            holdTimer = setTimeout(() => {
                document.getElementById('ribbonSystem').classList.add('untied');
                document.getElementById('page1').classList.add('revealed');
                document.getElementById('page1').classList.add('burst-active');

                document.body.className = "bg-page2";
                document.getElementById('globalNav').classList.add('show');
            }, 1200);
        }

        function cancelUntie() {
            clearTimeout(holdTimer);
            if (!document.getElementById('ribbonSystem').classList.contains('untied')) {
                document.getElementById('tagText').innerHTML = "Hold To Open";
            }
        }

        // --- Page 2 Touch Slider Drag Engine ---
        const knife = document.getElementById('knifeBtn');
        const sliderContainer = knife.parentElement;
        let isDragging = false;
        let startX = 0;

        knife.addEventListener('mousedown', dragStart);
        knife.addEventListener('touchstart', dragStart, { passive: true });
        window.addEventListener('mousemove', dragMove);
        window.addEventListener('touchmove', dragMove, { passive: false });
        window.addEventListener('mouseup', dragEnd);
        window.addEventListener('touchend', dragEnd);

        function dragStart(e) {
            if (document.getElementById('wishCard').classList.contains('cut-complete')) return;
            isDragging = true;
            startX = e.touches ? e.touches[0].clientX : e.clientX;
        }

        function dragMove(e) {
            if (!isDragging) return;
            if (e.cancelable) e.preventDefault();

            const currentX = e.touches ? e.touches[0].clientX : e.clientX;
            const containerRect = sliderContainer.getBoundingClientRect();
            const maxDelta = containerRect.width - knife.offsetWidth - 8;

            let deltaX = currentX - startX;
            if (deltaX < 0) deltaX = 0;
            if (deltaX > maxDelta) deltaX = maxDelta;

            knife.style.left = (deltaX + 4) + 'px';

            if (deltaX >= maxDelta - 2) {
                isDragging = false;
                triggerCakeCut();
            }
        }

        function dragEnd() {
            if (!isDragging) return;
            isDragging = false;
            if (!document.getElementById('wishCard').classList.contains('cut-complete')) {
                knife.style.transition = 'left 0.3s ease';
                knife.style.left = '4px';
                setTimeout(() => knife.style.transition = '', 300);
            }
        }

        function triggerCakeCut() {
            document.getElementById('wishCard').classList.add('cut-complete');
        }

        // --- Global Navigation Multi-Page Swapping Router ---
        function nextPage() {
            document.getElementById(`page${currentPage}`).classList.remove('active');
            currentPage++;
            if (currentPage > totalPages) currentPage = 1;
            document.getElementById(`page${currentPage}`).classList.add('active');

            if (currentPage === 1) document.body.className = "";
            else if (currentPage === 2) document.body.className = "bg-page2";
            else if (currentPage === 3) document.body.className = "bg-page3";

            const btn = document.getElementById('nextBtn');
            if (currentPage === 1) btn.innerText = "Open Card";
            else if (currentPage === 2) btn.innerText = "See Photos";
            else if (currentPage === 3) btn.innerText = "Read Again";
        }
    </script>

</body>

</html>
